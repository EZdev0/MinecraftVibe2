name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      working-directory: Minecraft2Vibe/Minecraft2Vibe

    - name: Build with Gradle
      run: ./gradlew assembleDebug
      working-directory: Minecraft2Vibe/Minecraft2Vibe

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: Minecraft2Vibe/Minecraft2Vibe/app/build/outputs/apk/debug/app-debug.apk

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write

    steps:
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: app-debug

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: "*.apk"
        tag_name: latest
        name: Latest Build
        body: 'Automatisch generiertes Release (Nightly) der aktuellen Version.'
        draft: false
        prerelease: false
