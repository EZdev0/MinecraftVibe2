name: Build MinecraftVibe2 APK

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Delete oldest artifacts to free storage quota
        # IMPORTANT: GitHub's quota recalculation takes 6-12h after deletion.
        # This step deletes old artifacts so the quota is freed OVER TIME.
        # The real fix is that upload-artifact is only used as fallback –
        # the APK is primarily published via GitHub Release (no quota impact).
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            const { data } = await github.rest.actions.listArtifactsForRepo({
              owner, repo, per_page: 100
            });

            const targets = data.artifacts
              .filter(a => a.name === "MinecraftVibe2-APK")
              .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

            console.log(`Found ${targets.length} "MinecraftVibe2-APK" artifact(s).`);

            // Keep only 2 newest, delete older ones to free quota over time
            const keep = 2;
            const toDelete = targets.slice(0, Math.max(0, targets.length - keep));
            console.log(`Will delete ${toDelete.length} old artifact(s), keeping ${Math.min(keep, targets.length)} newest.`);

            for (const artifact of toDelete) {
              console.log(`Deleting id=${artifact.id} created=${artifact.created_at} (${artifact.size_in_bytes} bytes)`);
              try {
                await github.rest.actions.deleteArtifact({
                  owner, repo, artifact_id: artifact.id
                });
                console.log(`  -> OK`);
              } catch(e) {
                console.log(`  -> FAILED: ${e.message}`);
              }
            }
            console.log(`Cleanup done. Deleted ${toDelete.length} artifact(s).`);

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: Minecraft2Vibe/Minecraft2Vibe

      - name: Build with Gradle
        run: ./gradlew assembleDebug
        working-directory: Minecraft2Vibe/Minecraft2Vibe

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp Minecraft2Vibe/Minecraft2Vibe/app/build/outputs/apk/debug/app-debug.apk release-assets/MinecraftVibe2-Debug.apk
          ls -lh release-assets/

      # ────────────────────────────────────────────────────────────────────────────
      # PRIMARY DOWNLOAD: GitHub Release asset (does NOT count against the
      # Actions artifact storage quota – completely separate storage system).
      # APK is always published as a release, on every branch/PR as a
      # pre-release so it can be downloaded without waiting for quota reset.
      # ────────────────────────────────────────────────────────────────────────────
      - name: Create GitHub Release (PRIMARY - quota-free)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Build #${{ github.run_number }} (${{ github.ref_name }})"
          prerelease: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}
          body: |
            Auto-generated build #${{ github.run_number }} from branch `${{ github.ref_name }}`.

            **Download & Install:** `MinecraftVibe2-Debug.apk`
            Contains latest UI Editor optimizations and fixes.

            Commit: ${{ github.sha }}
          generate_release_notes: false
          files: |
            release-assets/MinecraftVibe2-Debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ────────────────────────────────────────────────────────────────────────────
      # SECONDARY / OPTIONAL: Upload as workflow artifact too.
      # Uses continue-on-error so quota issues never fail the whole build.
      # Once GitHub recalculates quota (6-12h) this will work again.
      # ────────────────────────────────────────────────────────────────────────────
      - name: Upload APK as workflow artifact (best-effort)
        uses: actions/upload-artifact@v4
        continue-on-error: true   # quota error → build still green, APK in Release
        with:
          name: MinecraftVibe2-APK
          path: |
            release-assets/MinecraftVibe2-Debug.apk
          if-no-files-found: warn
          retention-days: 3