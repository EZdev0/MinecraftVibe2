name: Build MinecraftVibe2 APK

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    outputs:
      apk_path: ${{ steps.find_apk.outputs.path }}
    steps:
      - name: Delete oldest artifacts to free storage quota
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const { data } = await github.rest.actions.listArtifactsForRepo({
              owner, repo, per_page: 100
            });
            const targets = data.artifacts
              .filter(a => a.name.includes("APK") || a.name === "app-debug" || a.name === "lint-report")
              .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
            for (const artifact of targets) {
              try {
                await github.rest.actions.deleteArtifact({
                  owner, repo, artifact_id: artifact.id
                });
              } catch(e) {}
            }

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: Minecraft2Vibe/Minecraft2Vibe

      - name: Build with Gradle
        run: ./gradlew assembleDebug
        working-directory: Minecraft2Vibe/Minecraft2Vibe

      - name: Rename APK
        run: |
          mv Minecraft2Vibe/Minecraft2Vibe/app/build/outputs/apk/debug/app-debug.apk Minecraft2Vibe/Minecraft2Vibe/app/build/outputs/apk/debug/MinecraftVibe2-Debug.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: MinecraftVibe2-APK
          path: Minecraft2Vibe/Minecraft2Vibe/app/build/outputs/apk/debug/MinecraftVibe2-Debug.apk

  release:
    runs-on: ubuntu-latest
    needs: build
    # Run on every push to any branch to ensure APK availability via Release assets (fallback for artifact quota)
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # We dont download artifact here because it might have failed to upload due to quota.
      # Instead, we rebuild or just use a more robust way.
      # Actually, since we want this to be fast, rebuilding is not ideal but safe.
      # However, let attempt to download first.

      - name: Download build artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: MinecraftVibe2-APK
          path: release-assets

      - name: Build APK if artifact missing (Fallback)
        if: steps.download-artifact.outcome != 'success'
        run: |
          # Re-setup Java and build if download failed (quota hit)
          sudo apt-get update && sudo apt-get install -y openjdk-17-jdk
          cd Minecraft2Vibe/Minecraft2Vibe
          chmod +x gradlew
          ./gradlew assembleDebug
          mkdir -p ../../release-assets
          cp app/build/outputs/apk/debug/app-debug.apk ../../release-assets/MinecraftVibe2-Debug.apk

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          files: "release-assets/MinecraftVibe2-Debug.apk"
          tag_name: latest
          name: Latest MinecraftVibe2 Build
          body: |
            Automatisch generierter Build der aktuellen Version.
            Dieser Build enthält die neuesten Optimierungen für den UI Editor.

            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false
