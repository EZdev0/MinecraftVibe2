name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      working-directory: Minecraft2Vibe/Minecraft2Vibe

    - name: Build with Gradle
      run: ./gradlew assembleDebug
      working-directory: Minecraft2Vibe/Minecraft2Vibe

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: Minecraft2Vibe/Minecraft2Vibe/app/build/outputs/apk/debug/app-debug.apk

    - name: Create Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest Build
        body: Automatisch generiertes Release (Nightly) der aktuellen Version.
        files: Minecraft2Vibe/Minecraft2Vibe/app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
